<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<style>
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;width:100%;height:100%;}
  :root{
    --skin:#f1c27d; --hair:#2a1a0a; --shirt:#00f0ff; --pants:#22305a; --eyes:#1a1a1a; --shoe:#111;
  }
  #stage{width:100vw;height:100vh;display:flex;align-items:flex-end;justify-content:center;position:relative;}
  /* floating sparkles */
  .spark{position:absolute;width:5px;height:5px;border-radius:50%;background:#00f0ff;
    box-shadow:0 0 8px #00f0ff;opacity:.7;animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);opacity:.2}50%{transform:translateY(-22px);opacity:.9}}
  /* soft shadow under feet */
  #shadow{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
    width:70px;height:12px;border-radius:50%;background:rgba(0,240,255,.25);filter:blur(4px);}
  #char{
    position:relative;width:120px;height:200px;transform-origin:bottom center;
    animation:idle 3s ease-in-out infinite;z-index:2;
  }
  @keyframes idle{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-4px) rotate(.5deg)}}
  #char.walk{animation:walkbob .5s ease-in-out infinite;}
  @keyframes walkbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

  .part{position:absolute;left:50%;transform:translateX(-50%);}

  /* legs */
  #legL,#legR{width:16px;height:55px;border-radius:8px;background:var(--pants);bottom:0;}
  #legL{left:38px;transform-origin:top center;}
  #legR{left:66px;transform-origin:top center;}
  #char.walk #legL{animation:swingA .5s ease-in-out infinite;}
  #char.walk #legR{animation:swingB .5s ease-in-out infinite;}
  @keyframes swingA{0%,100%{transform:rotate(18deg)}50%{transform:rotate(-18deg)}}
  @keyframes swingB{0%,100%{transform:rotate(-18deg)}50%{transform:rotate(18deg)}}
  .shoe{position:absolute;bottom:-6px;width:22px;height:10px;border-radius:6px;background:var(--shoe);}
  #legL .shoe{left:-3px;} #legR .shoe{left:-3px;}

  /* body / shirt */
  #body{width:54px;height:62px;border-radius:16px;background:var(--shirt);bottom:48px;
        box-shadow:0 0 14px rgba(0,240,255,.35);}

  /* arms */
  #armL,#armR{width:14px;height:50px;border-radius:7px;background:var(--shirt);bottom:60px;transform-origin:top center;}
  #armL{left:30px;transform:rotate(12deg);}
  #armR{left:74px;transform:rotate(-12deg);}
  #char.wave #armR{animation:wave .5s ease-in-out infinite;}
  @keyframes wave{0%,100%{transform:rotate(-120deg)}50%{transform:rotate(-160deg)}}
  .hand{position:absolute;bottom:-8px;left:-1px;width:16px;height:16px;border-radius:50%;background:var(--skin);}

  /* head */
  #head{width:52px;height:52px;border-radius:50%;background:var(--skin);bottom:104px;
        box-shadow:0 0 16px rgba(0,240,255,.25);}
  #hair{width:56px;height:30px;border-radius:28px 28px 0 0;background:var(--hair);bottom:130px;}
  .eye{position:absolute;top:20px;width:8px;height:8px;border-radius:50%;background:var(--eyes);
       box-shadow:0 0 4px var(--eyes);transition:height .1s;}
  #eL{left:14px;} #eR{right:14px;}
  .eye.blink{height:1px;}
  #mouth{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
         width:16px;height:4px;border-radius:0 0 10px 10px;background:#7a3b2a;transition:all .1s;}
  #mouth.talk{height:10px;border-radius:8px;}
  #mouth.smile{height:7px;width:20px;border-radius:0 0 12px 12px;}
  #mouth.sad{height:7px;border-radius:12px 12px 0 0;}

  /* glow aura behind */
  #aura{position:absolute;left:50%;bottom:60px;transform:translateX(-50%);
        width:140px;height:170px;border-radius:50%;
        background:radial-gradient(circle,rgba(0,240,255,.18),transparent 70%);
        transition:background .5s;}
</style>
</head>
<body>
<div id="stage">
  <span class="spark" style="left:18%;bottom:40%;animation-delay:0s"></span>
  <span class="spark" style="left:78%;bottom:55%;animation-delay:1s"></span>
  <span class="spark" style="left:30%;bottom:70%;animation-delay:2s"></span>
  <span class="spark" style="left:68%;bottom:30%;animation-delay:1.5s;background:#7b2fff;box-shadow:0 0 8px #7b2fff"></span>
  <span class="spark" style="left:50%;bottom:80%;animation-delay:2.5s;background:#ff2ef7;box-shadow:0 0 8px #ff2ef7"></span>
  <div id="shadow"></div>
  <div id="char">
    <div id="aura"></div>
    <div class="part" id="legL"><div class="shoe"></div></div>
    <div class="part" id="legR"><div class="shoe"></div></div>
    <div class="part" id="armL"><div class="hand"></div></div>
    <div class="part" id="body"></div>
    <div class="part" id="armR"><div class="hand"></div></div>
    <div class="part" id="hair"></div>
    <div class="part" id="head">
      <div class="eye" id="eL"></div>
      <div class="eye" id="eR"></div>
      <div id="mouth"></div>
    </div>
  </div>
</div>

<script>
  var root=document.documentElement.style;
  var char=document.getElementById('char');
  var eL=document.getElementById('eL'), eR=document.getElementById('eR');
  var mouth=document.getElementById('mouth');
  var aura=document.getElementById('aura');
  var talkTimer=null;

  function blink(){eL.classList.add('blink');eR.classList.add('blink');
    setTimeout(function(){eL.classList.remove('blink');eR.classList.remove('blink');},130);}
  setInterval(function(){if(Math.random()<.8)blink();},3000);

  // talk: mouth flaps
  window.talk=function(ms){
    if(talkTimer)clearInterval(talkTimer);
    talkTimer=setInterval(function(){mouth.classList.toggle('talk');},140);
    setTimeout(function(){clearInterval(talkTimer);mouth.classList.remove('talk');},ms||3000);
  };
  // expressions
  window.setExpression=function(e){
    mouth.className='';
    if(e==='happy')mouth.classList.add('smile');
    else if(e==='sad')mouth.classList.add('sad');
    else if(e==='sleepy'){eL.classList.add('blink');eR.classList.add('blink');}
    else {eL.classList.remove('blink');eR.classList.remove('blink');}
  };
  // actions
  window.wave=function(){char.classList.add('wave');setTimeout(function(){char.classList.remove('wave');},2500);};
  window.walk=function(on){if(on)char.classList.add('walk');else char.classList.remove('walk');};
  // mood aura color
  window.setMood=function(m){
    var c = m==='excited' ? 'rgba(255,200,0,.25)' :
            m==='lonely'  ? 'rgba(60,120,255,.28)' :
            m==='sleepy'  ? 'rgba(123,47,255,.22)' : 'rgba(0,240,255,.18)';
    aura.style.background='radial-gradient(circle,'+c+',transparent 70%)';
  };
  // CUSTOMIZE — apply user's look
  window.applyStyle=function(skin,hair,shirt,pants,eyes,shoe){
    if(skin)root.setProperty('--skin',skin);
    if(hair)root.setProperty('--hair',hair);
    if(shirt)root.setProperty('--shirt',shirt);
    if(pants)root.setProperty('--pants',pants);
    if(eyes)root.setProperty('--eyes',eyes);
    if(shoe)root.setProperty('--shoe',shoe);
  };
  // read style from URL (?skin=...&hair=...) so it loads customized immediately
  (function(){
    var p=new URLSearchParams(location.search);
    window.applyStyle(p.get('skin'),p.get('hair'),p.get('shirt'),p.get('pants'),p.get('eyes'),p.get('shoe'));
  })();
  // wave hello on load
  setTimeout(function(){window.wave();},600);
</script>
</body>
</html>
